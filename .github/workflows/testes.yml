name: Testes API ServeRest

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  testes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configurar Node.js (Para instalar o ServeRest Local)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Iniciar o ServeRest Localmente
        run: |
          npm install -g serverest
          serverest &
          echo "Aguardando inicialização da API..."
          sleep 5

      - name: Executar testes com Pytest e Cobertura
        run: |
          pytest -v --cov=. --cov-report=term
